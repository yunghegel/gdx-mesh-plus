repositories {
    mavenCentral()
    maven { url 'https://s01.oss.sonatype.org' }
    mavenLocal()
    google()
    gradlePluginPortal()
    maven { url 'https://oss.sonatype.org/content/repositories/snapshots/' }
    maven { url 'https://s01.oss.sonatype.org/content/repositories/snapshots/' }
    maven { url 'https://jitpack.io' }
    maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
    maven { url "https://oss.sonatype.org/content/repositories/releases/" }
}

dependencies {
    implementation 'com.kotcrab.vis:vis-ui:1.5.1'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.2'
    implementation 'com.badlogicgames.gdx:gdx:1.11.0'
    implementation "com.badlogicgames.gdx:gdx-platform:1.11.0:natives-desktop"
    implementation "com.badlogicgames.gdx:gdx-backend-lwjgl3:1.11.0"
    implementation 'com.github.raeleus.stripe:stripe:1.4.5'
    testImplementation 'com.badlogicgames.gdx:gdx-freetype:1.11.0'
    testImplementation "com.badlogicgames.gdx:gdx-freetype-platform:1.11.0:natives-desktop"

}

subprojects {}

test {
    useJUnitPlatform()
}

